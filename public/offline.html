<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Musique</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #121212;
        color: #f5f5f7;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 28rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #a1a1aa;
        line-height: 1.5;
      }
      a {
        color: #22c55e;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Musique couldn't reach the network and this page hasn't been cached
        yet. If you've opened the app before, try
        <a href="/">going back to your library</a> — previously loaded pages
        and songs work without a connection.
      </p>
    </div>
  </body>
</html>
